title: Marketplace
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: marketplace
    field:
      type: grid
      display: Marketplace
      fields:
        -
          handle: marketplace_logo
          field:
            container: assets
            max_files: 1
            type: assets
            display: 'Marketplace Logo'
            width: 50
            validate:
              - required
        -
          handle: marketplace_url
          field:
            type: link
            display: 'Marketplace URL'
            width: 50
            validate:
              - required
