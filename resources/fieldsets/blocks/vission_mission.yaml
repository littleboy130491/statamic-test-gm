title: 'Vision Mission'
fields:
  -
    import: common.identifier
  -
    handle: photo
    field:
      container: assets
      max_files: 1
      type: assets
      display: Photo
  -
    handle: content
    field:
      type: grid
      display: Content
      fields:
        -
          handle: title
          field:
            type: text
            display: Title
        -
          handle: description
          field:
            container: assets
            remove_empty_nodes: false
            type: bard
            display: Description
  -
    handle: photo_background
    field:
      container: assets
      max_files: 1
      type: assets
      display: 'Photo Background'
  -
    import: common.section_settings
