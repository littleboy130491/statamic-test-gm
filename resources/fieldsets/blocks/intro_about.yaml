title: Intro / about
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
      validate: required
  -
    handle: body
    field:
      type: textarea
      display: Body
  -
    handle: partner_logos
    field:
      type: assets
      display: Partner / certification logos
      container: assets
  -
    handle: stats
    field:
      type: grid
      display: Statistics
      mode: stacked
      add_row: Add statistic
      fields:
        -
          handle: value
          field:
            type: text
            display: Value
            validate: required
        -
          handle: label
          field:
            type: text
            display: Label
            validate: required
  -
    handle: button
    field:
      type: group
      display: Button
      fields:
        -
          import: common.button
  -
    handle: image
    field:
      type: assets
      display: Image
      container: assets
      max_files: 1
  -
    handle: image_position
    field:
      type: select
      display: Image position
      default: right
      options:
        left: Left
        right: Right
