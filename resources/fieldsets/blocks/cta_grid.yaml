title: 'CTA Grid'
fields:
  -
    import: common.identifier
  -
    handle: image_call_to_action
    field:
      container: assets
      max_files: 1
      type: assets
      display: 'Image Call to Action'
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: description
    field:
      container: assets
      remove_empty_nodes: false
      type: bard
      display: Description
  -
    handle: call_to_action
    field:
      mode: stacked
      add_row: 'Add Row'
      type: grid
      display: 'Call to Action'
      fields:
        -
          handle: icon
          field:
            container: assets
            max_files: 1
            type: assets
            display: Icon
            instructions: 'Jika dikosongkan akan otomatis menampilkan icon WhatsApp'
        -
          handle: label
          field:
            type: text
            display: Label
            instructions: 'Informasi label seperti: Call & WA Center, Email Perusahaan, Hubungi Kami'
        -
          handle: kontak
          field:
            type: text
            display: Kontak
            instructions: 'Nomor WhatsApp, Email.'
  -
    import: common.section_settings
