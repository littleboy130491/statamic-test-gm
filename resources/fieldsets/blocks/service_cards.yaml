title: Service cards
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
      validate: required
  -
    handle: text
    field:
      type: textarea
      display: Description
  -
    handle: cards
    field:
      type: grid
      display: Cards
      mode: stacked
      add_row: Add card
      validate: required
      fields:
        -
          handle: image
          field:
            type: assets
            display: Image
            container: assets
            max_files: 1
        -
          handle: title
          field:
            type: text
            display: Title
            validate: required
        -
          handle: text
          field:
            type: textarea
            display: Description
        -
          handle: link_label
          field:
            type: text
            display: Link label
            default: Selengkapnya
        -
          handle: link
          field:
            type: link
            display: Link
