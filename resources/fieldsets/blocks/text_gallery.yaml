title: 'Text & Gallery'
fields:
  -
    handle: identifier
    field:
      type: text
      display: Identifier
  -
    handle: gallery_grid
    field:
      type: grid
      display: 'Gallery Grid'
      fields:
        -
          handle: label
          field:
            type: text
            display: Label
        -
          handle: assets_field
          field:
            container: assets
            max_files: 1
            type: assets
            display: 'Assets Field'
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: description
    field:
      container: assets
      remove_empty_nodes: false
      type: bard
      display: Description
  -
    handle: show
    field:
      default: true
      type: toggle
      display: Show
