tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              display: Name
              type: text
              validate: 'required|max:255'
              placeholder: Nama
          -
            handle: phone
            field:
              display: 'Phone Number'
              type: text
              input_type: tel
              validate: 'required|max:50'
              width: 50
              placeholder: 'No Telepon'
          -
            handle: email
            field:
              display: Email
              type: text
              input_type: email
              validate: 'required|email|max:255'
              width: 50
              placeholder: Email
          -
            handle: source
            field:
              display: 'How did you hear about us?'
              type: select
              placeholder: 'Dari mana Anda mendengar tentang GM Mobil?'
              options:
                -
                  key: website
                  value: Website
                -
                  key: search_engine
                  value: 'Search engine'
                -
                  key: social_media
                  value: 'Social media'
                -
                  key: dealer
                  value: 'Dealer / partner'
                -
                  key: referral
                  value: Referral
                -
                  key: email
                  value: Email
                -
                  key: phone
                  value: Phone
                -
                  key: other
                  value: Other
              validate: required
          -
            handle: message
            field:
              display: Message
              type: textarea
              validate: 'required|max:5000'
              placeholder: 'Pesan Anda'
