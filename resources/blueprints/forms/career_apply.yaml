tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              display: Name
              type: text
              validate: 'required|max:255'
              width: 50
          -
            handle: position
            field:
              display: Position
              type: text
              validate: 'required|max:255'
              instructions: 'Role you are applying for.'
              width: 50
          -
            handle: email
            field:
              display: Email
              type: text
              input_type: email
              validate: 'required|email|max:255'
              width: 50
          -
            handle: phone
            field:
              display: Phone
              type: text
              input_type: tel
              validate: 'required|max:50'
              width: 50
          -
            handle: cv
            field:
              display: 'CV / Resume'
              type: assets
              container: assets
              max_files: 1
              folder: form-uploads/careers
              validate:
                - required
                - file
                - 'mimes:pdf,doc,docx'
                - 'max:5120'
