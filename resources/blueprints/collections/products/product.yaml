title: Product
tabs:
  main:
    display: Main
    sections:
      -
        display: Hero
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              localizable: true
              validate:
                - required
          -
            handle: featured_image
            field:
              type: assets
              display: 'Featured Image'
              container: assets
              max_files: 1
              localizable: true
          -
            handle: description
            field:
              type: bard
              display: Description
              localizable: true
              instructions: 'Introductory copy shown below the title.'
              buttons:
                - bold
                - italic
                - anchor
                - unorderedlist
                - orderedlist
                - removeformat
          -
            handle: cta_label
            field:
              type: text
              display: 'CTA Label'
              default: 'Kontak Kami'
              localizable: true
          -
            handle: cta_link
            field:
              type: link
              display: 'CTA Link'
              localizable: true
      -
        display: Spesification
        fields:
          -
            handle: product_specifications
            field:
              type: grid
              display: 'Product Specifications'
              fields:
                -
                  handle: heading
                  field:
                    type: text
                    display: Heading
                    width: 50
                    validate:
                      - required
                -
                  handle: short_description
                  field:
                    type: text
                    display: 'Short Description'
                    width: 50
                    validate:
                      - required
      -
        display: 'Product Comparison'
        fields:
          -
            handle: dimention
            field:
              type: text
              display: Dimention
              width: 25
          -
            handle: engine
            field:
              type: text
              display: Engine
              width: 25
          -
            handle: chassis
            field:
              type: text
              display: Chassis
              width: 25
          -
            handle: safety_security
            field:
              type: text
              display: 'Safety & Security'
              width: 25
      -
        display: Catalogue
        fields:
          -
            handle: catalogue_link
            field:
              type: group
              display: 'Catalogue Link'
              localizable: true
              fields:
                -
                  handle: label
                  field:
                    type: text
                    display: Label
                -
                  handle: url
                  field:
                    type: link
                    display: URL
                -
                  handle: displayed
                  field:
                    type: toggle
                    display: Displayed
                    default: false
  specifications:
    display: Specifications
    sections:
      -
        fields:
          -
            handle: specifications
            field:
              type: grid
              display: Specifications
              mode: stacked
              add_row: 'Add Specification'
              fields:
                -
                  handle: label
                  field:
                    type: text
                    display: Label
                    validate: required
                    width: 50
                -
                  handle: value
                  field:
                    type: text
                    display: Value
                    validate: required
                    width: 50
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: sku
            field:
              type: text
              display: SKU
              localizable: true
              validate: 'new \Statamic\Rules\UniqueEntryValue({collection}, {id}, {site})'
          -
            handle: product_categories
            field:
              type: terms
              taxonomies:
                - product_categories
              display: 'Product Categories'
              mode: select
          -
            handle: industries
            field:
              type: terms
              taxonomies:
                - industries
              display: Industries
              mode: select
  'SEO Meta':
    display: 'SEO Meta'
    sections:
      -
        fields:
          -
            handle: seo
            field:
              type: seo_pro
              listable: false
              display: SEO
  'SEO Previews':
    display: 'SEO Previews'
    sections:
      -
        fields:
          -
            handle: seo_previews
            field:
              type: seo_pro_previews
              listable: false
              display: 'SEO Previews'
              localizable: false
              hide_display: true
              unless:
                seo.enabled: 'equals false'
