title: Product
tabs:
  main:
    display: Main
    sections:
      -
        display: Hero
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              localizable: true
          -
            handle: featured_image
            field:
              type: assets
              display: Featured Image
              container: assets
              max_files: 1
              localizable: true
          -
            handle: description
            field:
              type: bard
              display: Description
              localizable: true
              instructions: Introductory copy shown below the title.
              buttons:
                - bold
                - italic
                - anchor
                - unorderedlist
                - orderedlist
                - removeformat
          -
            handle: cta_label
            field:
              type: text
              display: CTA Label
              default: Kontak Kami
              localizable: true
          -
            handle: cta_link
            field:
              type: link
              display: CTA Link
              localizable: true
      -
        display: Catalogue
        fields:
          -
            handle: catalogue_link
            field:
              type: group
              display: Catalogue Link
              localizable: true
              fields:
                -
                  handle: label
                  field:
                    type: text
                    display: Label
                -
                  handle: url
                  field:
                    type: link
                    display: URL
                -
                  handle: displayed
                  field:
                    type: toggle
                    display: Displayed
                    default: false
  specifications:
    display: Specifications
    sections:
      -
        fields:
          -
            handle: specifications
            field:
              type: grid
              display: Specifications
              mode: stacked
              add_row: Add Specification
              fields:
                -
                  handle: label
                  field:
                    type: text
                    display: Label
                    validate: required
                    width: 50
                -
                  handle: value
                  field:
                    type: text
                    display: Value
                    validate: required
                    width: 50
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: sku
            field:
              type: text
              display: SKU
              localizable: true
              validate: 'new \Statamic\Rules\UniqueEntryValue({collection}, {id}, {site})'
