title: Achievement
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              localizable: true
          -
            handle: featured_image
            field:
              type: assets
              display: Featured Image
              container: assets
              max_files: 1
              localizable: true
          -
            handle: description
            field:
              type: bard
              display: Description
              localizable: true
              buttons:
                - bold
                - italic
                - anchor
                - unorderedlist
                - orderedlist
                - removeformat
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
