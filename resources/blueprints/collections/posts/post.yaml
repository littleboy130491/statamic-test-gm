title: Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              localizable: true
              validate:
                - required
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
              localizable: true
          -
            handle: description
            field:
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - removeformat
                - quote
                - anchor
                - image
                - table
                - h4
                - h5
                - h6
                - underline
                - strikethrough
                - small
                - superscript
                - subscript
              container: assets
              remove_empty_nodes: false
              type: bard
              display: Description
          -
            handle: gallery
            field:
              type: assets
              display: 'Image Gallery'
              container: assets
              mode: grid
              localizable: true
              validate:
                - image
          -
            handle: featured_image
            field:
              type: assets
              display: 'Featured Image'
              container: assets
              max_files: 1
              localizable: true
          -
            handle: categories
            field:
              type: terms
              taxonomies:
                - categories
              display: Categories
              localizable: true
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              display: 'Publish Date'
              time_enabled: true
              localizable: true
              validate:
                - required
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              max_items: 1
              localizable: true
  'SEO Meta':
    display: 'SEO Meta'
    sections:
      -
        fields:
          -
            handle: seo
            field:
              type: seo_pro
              listable: false
              display: SEO
  'SEO Previews':
    display: 'SEO Previews'
    sections:
      -
        fields:
          -
            handle: seo_previews
            field:
              type: seo_pro_previews
              listable: false
              display: 'SEO Previews'
              localizable: false
              hide_display: true
              unless:
                seo.enabled: 'equals false'
