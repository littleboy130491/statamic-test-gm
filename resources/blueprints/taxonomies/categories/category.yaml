title: Category
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              localizable: true
          -
            handle: content
            field:
              type: textarea
              display: Description
              localizable: true
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: terms
              taxonomies:
                - categories
              max_items: 1
              display: Parent Category
              localizable: true
