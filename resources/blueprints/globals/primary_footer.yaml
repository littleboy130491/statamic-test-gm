title: 'Primary Footer'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: image
            field:
              container: assets
              max_files: 1
              min_files: 1
              type: assets
              display: Image
              validate:
                - required
          -
            handle: heading
            field:
              type: text
              display: Heading
              validate:
                - required
          -
            handle: short_description
            field:
              type: textarea
              display: 'Short Description'
          -
            handle: backgound_image
            field:
              container: assets
              max_files: 1
              min_files: 1
              type: assets
              display: 'Backgound Image'
              instructions: 'Silahkan upload image dengan overlay berwarna'
              validate:
                - required
          -
            handle: label_button
            field:
              type: text
              display: 'Label Button'
              instructions: 'default: Konsultasi Sekarang'
              validate:
                - required
          -
            handle: url_button
            field:
              type: link
              display: 'URL Button'
              instructions: 'None: menonaktifkan button | URL: untuk external link | Entry: mengarahkan user ke halaman website.'
          -
            handle: show
            field:
              type: toggle
              display: Show
