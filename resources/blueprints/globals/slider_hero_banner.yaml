title: 'Slider Hero Banner'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: identifier
            field:
              type: text
              display: Identifier
              validate:
                - required
          -
            handle: slider_hero_banner
            field:
              mode: stacked
              type: grid
              display: 'Slider Hero Banner'
              validate:
                - required
              fields:
                -
                  handle: heading
                  field:
                    type: text
                    display: Heading
                    validate:
                      - required
                -
                  handle: short_description
                  field:
                    type: textarea
                    display: 'Short Description'
                -
                  handle: label_button
                  field:
                    type: text
                    display: 'Label Button'
                    validate:
                      - required
                -
                  handle: url_button
                  field:
                    type: link
                    display: 'URL Button'
                    validate:
                      - required
                -
                  handle: image_background
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    display: 'Image Background'
                -
                  handle: video_background
                  field:
                    type: video
                    display: 'Video Background'
                    instructions: 'Silahkan paste URL video (YouTube).'
          -
            handle: show
            field:
              type: toggle
              display: Show
