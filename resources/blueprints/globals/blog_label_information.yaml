title: 'Blog Label Information'
tabs:
  main:
    display: Main
    sections:
      -
        display: 'Archive & Single Blog'
        fields:
          -
            handle: category_labels
            field:
              type: text
              display: 'Category Labels'
              validate:
                - required
          -
            handle: latest_blog_label
            field:
              type: text
              display: 'Latest Blog Label'
              validate:
                - required
          -
            handle: label_share
            field:
              type: text
              display: 'Label Share'
              validate:
                - required
          -
            handle: related_news_labels
            field:
              type: text
              display: 'Related News Labels'
              validate:
                - required
      -
        display: 'Loop Blog'
        fields:
          -
            handle: image_placeholders
            field:
              container: assets
              max_files: 1
              type: assets
              display: 'Image Placeholders'
              validate:
                - required
      -
        display: 'Share Button'
        fields:
          -
            handle: platforms
            field:
              type: grid
              display: Platforms
              fields:
                -
                  handle: icon
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    display: Icon
                    width: 25
                    validate:
                      - required
                -
                  handle: url_share
                  field:
                    type: link
                    display: 'URL Share'
                    width: 25
                    validate:
                      - required
                -
                  handle: label
                  field:
                    type: text
                    display: Label
                    width: 25
                -
                  handle: show
                  field:
                    default: true
                    type: toggle
                    display: Show
                    width: 25
